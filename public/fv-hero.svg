<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- 装飾的な円 -->
  <circle cx="900" cy="250" r="300" fill="url(#accent)"/>
  <circle cx="950" cy="200" r="180" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <circle cx="850" cy="300" r="120" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <!-- グリッドライン -->
  <line x1="0" y1="166" x2="1200" y2="166" stroke="#000" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="333" x2="1200" y2="333" stroke="#000" stroke-width="0.5" opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#000" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#000" stroke-width="0.5" opacity="0.04"/>
  <line x1="900" y1="0" x2="900" y2="500" stroke="#000" stroke-width="0.5" opacity="0.04"/>
  <!-- テキスト -->
  <text x="120" y="200" font-family="Georgia,serif" font-size="56" font-weight="700" fill="#111827" letter-spacing="-1">QOL media</text>
  <text x="122" y="248" font-family="Arial,sans-serif" font-size="16" fill="#6b7280" letter-spacing="4">INFORMATION SITE TO ENHANCE QUALITY OF LIFE</text>
  <line x1="120" y1="268" x2="500" y2="268" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <text x="120" y="310" font-family="Arial,sans-serif" font-size="20" fill="#374151" letter-spacing="1">生活の質を、もっと高く。</text>
</svg>